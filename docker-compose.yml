services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: trackmate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trackmate"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    restart: "no"
    env_file:
      - .env
    environment:
      TRACKMATE__DATABASE_URL: postgres://postgres:postgres@postgres:5432/trackmate?sslmode=disable
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TRACKMATE__DATABASE_URL: postgres://postgres:postgres@postgres:5432/trackmate?sslmode=disable
    command: ["trackmate-api"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "trackmate-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TRACKMATE__DATABASE_URL: postgres://postgres:postgres@postgres:5432/trackmate?sslmode=disable
      TRACKMATE__CONTROL_HTTP_ADDR: ":8082"
    command: ["trackmate-worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8082:8082"
    healthcheck:
      test: ["CMD", "trackmate-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
